<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register | Campus Housing</title>
  <link rel="stylesheet" href="./style.css" />
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <style>
    .password-container {
      position: relative;
      width: 100%;
    }

    .password-container input {
      width: 100%;
      box-sizing: border-box;
      padding-right: 45px;
    }

    .toggle-password {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      user-select: none;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #8a8f98;
      transition: color 0.15s ease;
    }

    .toggle-password:hover {
      color: #4b5563;
    }

    .toggle-password svg {
      width: 20px;
      height: 20px;
      display: block;
    }

    .toggle-password .icon-hide {
      display: none;
    }

    .toggle-password.active .icon-show {
      display: none;
    }

    .toggle-password.active .icon-hide {
      display: block;
    }

    /* Role selector */
    .role-select {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 22px;
    }

    .role-option {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      text-align: center;
      padding: 18px 12px 16px;
      border: 2px solid rgba(47, 95, 232, 0.16);
      border-radius: 16px;
      background: rgba(248, 250, 255, 0.95);
      cursor: pointer;
      transition: border-color 0.18s ease, background 0.18s ease, transform 0.18s ease, box-shadow 0.18s ease;
    }

    .role-option:hover {
      transform: translateY(-2px);
      border-color: rgba(47, 95, 232, 0.4);
    }

    .role-option input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .role-icon {
      width: 42px;
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      font-size: 1.3rem;
      background: rgba(47, 95, 232, 0.1);
      color: var(--primary);
      transition: background 0.18s ease, color 0.18s ease;
    }

    .role-title {
      font-weight: 800;
      font-size: 1rem;
      color: var(--text);
    }

    .role-desc {
      font-size: 0.78rem;
      color: var(--subtle);
      line-height: 1.25;
    }

    .role-check {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--primary);
      color: #fff;
      display: none;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
    }

    .role-option.selected {
      border-color: var(--primary);
      background: linear-gradient(135deg, rgba(47, 95, 232, 0.1), rgba(15, 159, 143, 0.08));
      box-shadow: 0 10px 24px rgba(47, 95, 232, 0.16);
    }

    .role-option.selected .role-icon {
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: #fff;
    }

    .role-option.selected .role-check {
      display: flex;
    }

    .role-select-label {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--subtle);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 10px;
      display: block;
    }
  </style>
</head>
<body class="auth-page">
  <div class="auth-card">
    <div>
      <h1>Create your account</h1>
      <p>Sign up to discover apartments, connect with landlords, and manage your housing search.</p>
    </div>

    <span class="role-select-label">I am signing up as a</span>
    <div class="role-select" role="radiogroup" aria-label="Account type">
      <label class="role-option selected" data-role="student">
        <input type="radio" name="roleChoice" value="student" checked />
        <span class="role-check">&#10003;</span>
        <span class="role-icon">&#127891;</span>
        <span class="role-title">Student</span>
        <span class="role-desc">Browse listings &amp; find roommates</span>
      </label>
      <label class="role-option" data-role="landlord">
        <input type="radio" name="roleChoice" value="landlord" />
        <span class="role-check">&#10003;</span>
        <span class="role-icon">&#127970;</span>
        <span class="role-title">Landlord / Agent</span>
        <span class="role-desc">List properties &amp; manage tenants</span>
      </label>
    </div>

    <div id="googleSignInButton"></div>
    <div class="divider"><span>or</span></div>

    <form id="registerForm" class="auth-form">
      <input type="text" id="name" placeholder="Full name" required />

      <input type="email" id="email" placeholder="Email address" required />

      <div class="password-container">
        <input type="password" id="password" placeholder="Password" required />
        <span class="toggle-password" onclick="togglePassword('password', this)">
          <svg class="icon-show" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8Z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
          <svg class="icon-hide" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17.94 17.94A10.94 10.94 0 0 1 12 20c-7 0-11-8-11-8a18.5 18.5 0 0 1 5.06-5.94M9.9 4.24A10.94 10.94 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
            <line x1="1" y1="1" x2="23" y2="23"/>
          </svg>
        </span>
      </div>

      <div class="password-container">
        <input type="password" id="confirmPassword" placeholder="Confirm Password" required />
        <span class="toggle-password" onclick="togglePassword('confirmPassword', this)">
          <svg class="icon-show" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8Z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
          <svg class="icon-hide" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17.94 17.94A10.94 10.94 0 0 1 12 20c-7 0-11-8-11-8a18.5 18.5 0 0 1 5.06-5.94M9.9 4.24A10.94 10.94 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
            <line x1="1" y1="1" x2="23" y2="23"/>
          </svg>
        </span>
      </div>

      <button type="submit" class="btn btn-primary">Create account</button>

      <p id="error" class="form-error"></p>
    </form>

    <p class="secondary-text">
      Already have an account?
      <a href="login.html">Login</a>
    </p>
  </div>

  <script>
    document.querySelectorAll(".role-option").forEach((option) => {
      option.addEventListener("click", () => {
        document.querySelectorAll(".role-option").forEach((o) => o.classList.remove("selected"));
        option.classList.add("selected");
        option.querySelector('input[type="radio"]').checked = true;
      });
    });

    function togglePassword(id, icon) {
      const input = document.getElementById(id);
      if (input.type === "password") {
        input.type = "text";
        icon.classList.add("active");
      } else {
        input.type = "password";
        icon.classList.remove("active");
      }
    }
  </script>

  <script src="google-auth.js"></script>
  <script src="register.js"></script>
</body>
</html>
