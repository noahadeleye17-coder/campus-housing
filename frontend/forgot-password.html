<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password | Campus Housing</title>
  <link rel="icon" type="image/svg+xml" href="icons/favicon.svg" />
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png" />
<link rel="icon" type="image/png" sizes="192x192" href="icons/favicon-192.png" />
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
<link rel="alternate icon" href="icons/favicon.ico" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body class="auth-page">
  <div class="auth-card">
    <div>
      <h1>Forgot your password?</h1>
      <p>Enter the email on your account and we'll send you a link to reset your password.</p>
    </div>

    <form id="forgotPasswordForm" class="auth-form">
      <input type="email" id="email" placeholder="Email address" required />

      <button type="submit" class="btn btn-primary" id="submitBtn">Send reset link</button>

      <p id="message" class="form-error"></p>
    </form>

    <p class="secondary-text">
      Remembered your password? <a href="login.html">Back to login</a>
    </p>
  </div>

  <script src="forgot-password.js"></script>
</body>
</html>
