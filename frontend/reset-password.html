<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password | Campus Housing</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="favicon-192.png" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="alternate icon" href="favicon.ico" />
  <link rel="stylesheet" href="./style.css" />

  <style>
    .password-container {
      position: relative;
      width: 100%;
    }

    .password-container input {
      width: 100%;
      box-sizing: border-box;
      padding-right: 45px;
    }

    .toggle-password {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      user-select: none;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #8a8f98;
      transition: color 0.15s ease;
    }

    .toggle-password:hover {
      color: #4b5563;
    }

    .toggle-password svg {
      width: 20px;
      height: 20px;
      display: block;
    }

    .toggle-password .icon-hide {
      display: none;
    }

    .toggle-password.active .icon-show {
      display: none;
    }

    .toggle-password.active .icon-hide {
      display: block;
    }
  </style>
</head>
<body class="auth-page">
  <div class="auth-card">
    <div>
      <h1>Set a new password</h1>
      <p>Choose a new password for your account below.</p>
    </div>

    <form id="resetPasswordForm" class="auth-form">
      <div class="password-container">
        <input type="password" id="password" placeholder="New password" required minlength="6" />
        <span class="toggle-password" onclick="togglePassword('password', this)">
          <svg class="icon-show" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8Z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
          <svg class="icon-hide" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17.94 17.94A10.94 10.94 0 0 1 12 20c-7 0-11-8-11-8a18.5 18.5 0 0 1 5.06-5.94M9.9 4.24A10.94 10.94 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
            <line x1="1" y1="1" x2="23" y2="23"/>
          </svg>
        </span>
      </div>

      <div class="password-container">
        <input type="password" id="confirmPassword" placeholder="Confirm new password" required minlength="6" />
        <span class="toggle-password" onclick="togglePassword('confirmPassword', this)">
          <svg class="icon-show" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8Z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
          <svg class="icon-hide" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17.94 17.94A10.94 10.94 0 0 1 12 20c-7 0-11-8-11-8a18.5 18.5 0 0 1 5.06-5.94M9.9 4.24A10.94 10.94 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
            <line x1="1" y1="1" x2="23" y2="23"/>
          </svg>
        </span>
      </div>

      <button type="submit" class="btn btn-primary" id="submitBtn">Reset password</button>

      <p id="message" class="form-error"></p>
    </form>

    <p class="secondary-text">
      <a href="login.html">Back to login</a>
    </p>
  </div>

  <script>
    function togglePassword(id, icon) {
      const input = document.getElementById(id);
      if (input.type === "password") {
        input.type = "text";
        icon.classList.add("active");
      } else {
        input.type = "password";
        icon.classList.remove("active");
      }
    }
  </script>

  <script src="reset-password.js"></script>
</body>
</html>
