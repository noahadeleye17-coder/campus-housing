<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Campus Housing</title>

  <!-- Main CSS -->
  <link rel="stylesheet" href="style.css" />

  <!-- Leaflet CSS (for map – optional display) -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
</head>
<body>

  <!-- NAVBAR -->
  <header class="navbar">
    <h1>Campus Housing</h1>
    <p class="tagline">Find apartments near your campus</p>
  </header>

  <!-- MAIN CONTENT -->
  <main class="container">

    <!-- MAP SECTION (can be hidden later if you want) -->
    <section class="map-section">
      <h2>Apartment Locations</h2>
      <div id="map"></div>
    </section>

    <!-- APARTMENT LIST -->
    <section>
      <h2>Available Apartments</h2>
      <div id="apartments" class="grid">
        <p class="loading">Loading apartments...</p>
      </div>
    </section>

  </main>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- App JS -->
  <script src="app.js"></script>
</body>
</html>
